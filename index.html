<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Dev Roadmap — Login</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <meta name="theme-color" content="#0a0a0f"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <h1 class="brand-title">AI Dev Roadmap</h1>
        <p class="brand-sub">Track your journey to Full Stack AI Developer</p>
      </div>

      <!-- TAB SWITCHER -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@email.com"/>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn-primary" onclick="loginUser()">Sign In →</button>
        <button class="btn-google" onclick="loginGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/>
          Continue with Google
        </button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="form-signup" style="display:none">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name"/>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@email.com"/>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters"/>
        </div>
        <div class="input-group">
          <label>GitHub Username (optional)</label>
          <input type="text" id="signup-github" placeholder="e.g. yourhandle"/>
        </div>
        <div class="error-msg" id="signup-error"></div>
        <button class="btn-primary" onclick="signupUser()">Create Account →</button>
        <button class="btn-google" onclick="loginGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/>
          Continue with Google
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
